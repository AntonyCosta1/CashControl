<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CashControl - Investimentos</title>

  <!-- Fontes -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet"
  />

  <!-- CSS compartilhado -->
  <link rel="stylesheet" href="css/style.css" />
  <!-- CSS específico de investimentos -->
  <link rel="stylesheet" href="css/investimentos.css" />

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>
<div class="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo">
      <img src="assets/logo.png" alt="Logo do CashControl" />
      <h1>CashControl</h1>
      <span>Controle de Gastos</span>
    </div>
    <nav>
      <button onclick="window.location.href='index.html'">Dashboard</button>
      <button onclick="window.location.href='index.html'">Registrar</button>
      <button onclick="window.location.href='index.html'">Relatórios</button>
      <button class="active">Investimentos</button>
    </nav>
  </header>

  <!-- ── KPI CARDS ── -->
  <div class="kpi-row" id="inv-kpi-row"></div>

  <!-- ── CONTEÚDO PRINCIPAL ── -->
  <div class="inv-main">

    <!-- Formulário de registro -->
    <div class="form-card">
      <div class="form-title">Novo <span>Investimento</span></div>
      <div class="form-grid">

        <div class="form-group full">
          <label>Nome / Descrição</label>
          <input type="text" id="inv-nome" placeholder="Ex: PETR4, Tesouro IPCA 2029..." />
        </div>

        <div class="form-group">
          <label>Tipo</label>
          <select id="inv-tipo">
            <option value="">Selecione</option>
            <option value="Ações">📈 Ações</option>
            <option value="Fundos Imobiliários">🏢 Fundos Imobiliários</option>
            <option value="Tesouro Direto">🏛 Tesouro Direto</option>
            <option value="Criptomoedas">₿ Criptomoedas</option>
            <option value="Renda Fixa">💰 Renda Fixa</option>
            <option value="Poupança">🐷 Poupança</option>
            <option value="Outros">📦 Outros</option>
          </select>
        </div>

        <div class="form-group">
          <label>Valor Investido (R$)</label>
          <input type="number" id="inv-valor" placeholder="0,00" min="0" step="0.01" />
        </div>

        <div class="form-group">
          <label>Data do Aporte</label>
          <input type="date" id="inv-data" />
        </div>

        <div class="form-group">
          <label>Valor Atual (R$)</label>
          <input type="number" id="inv-atual" placeholder="0,00" min="0" step="0.01" />
        </div>

        <div class="form-group full">
          <label>Observações</label>
          <input type="text" id="inv-obs" placeholder="Corretora, taxa, vencimento..." />
        </div>

        <div class="form-group full">
          <button class="submit-btn" onclick="addInvestimento()">+ Registrar Investimento</button>
          <div class="sucess-toast" id="inv-toast">
            ✅ Investimento registrado com sucesso!
          </div>
        </div>

      </div>
    </div>

    <!-- Painel direito: gráfico + lista -->
    <div class="inv-right">

      <!-- Gráfico de alocação -->
      <div class="chart-card">
        <div class="chart-title">Alocação por Tipo</div>
        <div class="chart-wrap"><canvas id="invPieChart"></canvas></div>
      </div>

    </div>
  </div><!-- /inv-main -->

  <!-- ── TABELA DE INVESTIMENTOS ── -->
  <div class="table-card" style="margin-top: 20px;">
    <div class="table-header">
      <div class="table-title">Carteira de Investimentos</div>
      <input
        class="search-box"
        type="text"
        placeholder="🔍 Buscar..."
        oninput="filterInvestimentos(this.value)"
      />
    </div>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Investido</th>
            <th>Valor Atual</th>
            <th>Rentabilidade</th>
            <th>Data</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="inv-tbody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /app -->

<script src="js/investimentos.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
